<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 800" width="1240" height="800" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141821"/>
      <stop offset="100%" stop-color="#0a0c11"/>
    </linearGradient>
    <linearGradient id="dropIcon" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5fd6e0"/>
      <stop offset="55%" stop-color="#2ba7c4"/>
      <stop offset="100%" stop-color="#0f4c72"/>
    </linearGradient>
    <linearGradient id="dropBody" x1="0.35" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#dff4fb"/>
      <stop offset="100%" stop-color="#a7d4e6"/>
    </linearGradient>
    <linearGradient id="lightCard" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#dedede"/>
    </linearGradient>
    <linearGradient id="darkCard" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#333739"/>
      <stop offset="100%" stop-color="#141516"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a3d"/>
      <stop offset="100%" stop-color="#ff5f6d"/>
    </linearGradient>
    <filter id="iconShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="windowShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <symbol id="waterIcon" viewBox="0 0 200 200">
      <rect x="20" y="20" width="160" height="160" rx="37" fill="url(#dropIcon)"/>
      <path d="M100 55 C124 88 141 108 141 126 a41 41 0 0 1 -82 0 C59 108 76 88 100 55 Z" fill="url(#dropBody)"/>
      <ellipse cx="86" cy="120" rx="11" ry="15" fill="#ffffff" opacity="0.75"/>
      <ellipse cx="100" cy="170" rx="34" ry="6" fill="#000" opacity="0.18"/>
    </symbol>
  </defs>

  <rect width="1240" height="800" fill="url(#pageBg)"/>

  <!-- window -->
  <g filter="url(#windowShadow)">
    <rect x="60" y="60" width="1120" height="680" rx="14" fill="#1c1f26"/>
  </g>

  <!-- title bar -->
  <rect x="60" y="60" width="1120" height="52" rx="14" fill="#23262e"/>
  <rect x="60" y="98" width="1120" height="14" fill="#23262e"/>
  <circle cx="88" cy="86" r="6.5" fill="#ff5f57"/>
  <circle cx="110" cy="86" r="6.5" fill="#febc2e"/>
  <circle cx="132" cy="86" r="6.5" fill="#28c840"/>
  <text x="160" y="91" fill="#9aa1ad" font-size="13">IconForge</text>
  <g transform="translate(576 78)">
    <path d="M2 14 L10 4 L14 8 L6 18 Z" fill="url(#accent)"/>
    <text x="22" y="15" fill="#e8eaef" font-size="14" font-weight="600">IconForge</text>
  </g>
  <circle cx="1140" cy="86" r="11" fill="#2b2f38"/>
  <path d="M1136 86 h8 M1140 82 v8" stroke="#9aa1ad" stroke-width="1.6" stroke-linecap="round"/>

  <!-- left inspector -->
  <rect x="60" y="112" width="392" height="628" fill="#191c22"/>
  <line x1="452" y1="112" x2="452" y2="740" stroke="#2b2f38" stroke-width="1"/>

  <text x="92" y="152" fill="#f2f4f8" font-size="17" font-weight="600">Describe the app</text>
  <text x="92" y="176" fill="#8b929c" font-size="12.5">IconForge writes the prompt, calls agy, and masks</text>
  <text x="92" y="194" fill="#8b929c" font-size="12.5">the result into a real macOS icon.</text>

  <!-- app name -->
  <text x="92" y="228" fill="#a8b0bb" font-size="12">App name</text>
  <rect x="92" y="238" width="328" height="30" rx="6" fill="#22262e" stroke="#333844"/>
  <text x="104" y="258" fill="#e8eaef" font-size="13">Tidepool</text>

  <!-- description -->
  <text x="92" y="294" fill="#a8b0bb" font-size="12">What it does</text>
  <rect x="92" y="304" width="328" height="62" rx="6" fill="#22262e" stroke="#333844"/>
  <text x="104" y="324" fill="#e8eaef" font-size="13">tracks daily water intake and reminds you</text>
  <text x="104" y="343" fill="#e8eaef" font-size="13">to drink</text>

  <!-- subject -->
  <text x="92" y="392" fill="#a8b0bb" font-size="12">Subject <tspan fill="#6e7580" font-size="11">optional, the model picks one</tspan></text>
  <rect x="92" y="402" width="328" height="30" rx="6" fill="#22262e" stroke="#333844"/>
  <text x="104" y="422" fill="#e8eaef" font-size="13">a single water droplet</text>

  <!-- palette -->
  <text x="92" y="458" fill="#a8b0bb" font-size="12">Palette <tspan fill="#6e7580" font-size="11">optional</tspan></text>
  <rect x="92" y="468" width="328" height="30" rx="6" fill="#22262e" stroke="#333844"/>
  <g>
    <rect x="104" y="476" width="65" height="14" rx="4" fill="#22262e"/>
    <rect x="104" y="476" width="13" height="14" fill="#03045E"/>
    <rect x="117" y="476" width="13" height="14" fill="#0077B6"/>
    <rect x="130" y="476" width="13" height="14" fill="#00B4D8"/>
    <rect x="143" y="476" width="13" height="14" fill="#90E0EF"/>
    <rect x="156" y="476" width="13" height="14" fill="#CAF0F8"/>
    <rect x="104" y="476" width="65" height="14" rx="4" fill="none" stroke="#3a4150"/>
  </g>
  <text x="181" y="488" fill="#e8eaef" font-size="13">Ocean Breeze</text>
  <path d="M404 480 l4 -5 l4 5 M404 486 l4 5 l4 -5" stroke="#8b929c" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- style picker -->
  <text x="92" y="524" fill="#a8b0bb" font-size="12">Style</text>
  <rect x="92" y="534" width="150" height="28" rx="6" fill="#22262e" stroke="#333844"/>
  <text x="104" y="553" fill="#e8eaef" font-size="12.5">Editorial</text>
  <path d="M226 545 l4 -5 l4 5 M226 551 l4 5 l4 -5" stroke="#8b929c" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <text x="252" y="524" fill="#a8b0bb" font-size="12">Finish</text>
  <rect x="252" y="534" width="168" height="28" rx="6" fill="#22262e" stroke="#333844"/>
  <text x="264" y="553" fill="#e8eaef" font-size="12.5">Apple edge</text>
  <path d="M404 545 l4 -5 l4 5 M404 551 l4 5 l4 -5" stroke="#8b929c" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- model picker -->
  <text x="92" y="580" fill="#a8b0bb" font-size="12">Model</text>
  <rect x="92" y="590" width="288" height="28" rx="6" fill="#22262e" stroke="#333844"/>
  <text x="104" y="609" fill="#e8eaef" font-size="12.5">gemini-3.1-pro-high</text>
  <path d="M364 601 l4 -5 l4 5 M364 607 l4 5 l4 -5" stroke="#8b929c" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <rect x="390" y="590" width="30" height="28" rx="6" fill="#252932" stroke="#343a46"/>
  <path d="M399 604 a6 6 0 1 1 2 4" stroke="#9aa1ad" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M398 598 v5 h5" stroke="#9aa1ad" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- buttons -->
  <rect x="92" y="632" width="328" height="32" rx="8" fill="url(#accent)"/>
  <text x="256" y="653" fill="#26140a" font-size="13.5" font-weight="600" text-anchor="middle">Generate icon</text>

  <rect x="92" y="672" width="158" height="28" rx="7" fill="#252932" stroke="#343a46"/>
  <text x="171" y="691" fill="#dfe3ea" font-size="12.5" text-anchor="middle">Reroll</text>
  <rect x="262" y="672" width="158" height="28" rx="7" fill="#252932" stroke="#343a46"/>
  <text x="341" y="691" fill="#dfe3ea" font-size="12.5" text-anchor="middle">Export</text>

  <rect x="92" y="708" width="328" height="28" rx="7" fill="#252932" stroke="#343a46"/>
  <text x="256" y="727" fill="#dfe3ea" font-size="12.5" text-anchor="middle">Reveal in Finder</text>

  <!-- preview area -->
  <rect x="452" y="112" width="728" height="516" fill="#1b1e25"/>

  <!-- light card -->
  <rect x="536" y="180" width="268" height="268" rx="18" fill="url(#lightCard)" stroke="#3a3f4a"/>
  <g filter="url(#iconShadow)">
    <use href="#waterIcon" x="581" y="225" width="178" height="178"/>
  </g>
  <text x="670" y="474" fill="#8b929c" font-size="12" text-anchor="middle">Light desktop</text>

  <!-- dark card -->
  <rect x="836" y="180" width="268" height="268" rx="18" fill="url(#darkCard)" stroke="#3a3f4a"/>
  <g filter="url(#iconShadow)">
    <use href="#waterIcon" x="881" y="225" width="178" height="178"/>
  </g>
  <text x="970" y="474" fill="#8b929c" font-size="12" text-anchor="middle">Dark desktop</text>

  <!-- small sizes -->
  <use href="#waterIcon" x="700" y="486" width="32" height="32"/>
  <text x="716" y="532" fill="#8b929c" font-size="10" text-anchor="middle">32pt</text>
  <use href="#waterIcon" x="756" y="494" width="16" height="16"/>
  <text x="764" y="532" fill="#8b929c" font-size="10" text-anchor="middle">16pt</text>
  <text x="800" y="508" fill="#666d78" font-size="11.5">small sizes should still read at a glance</text>

  <!-- file chips -->
  <g font-size="11" fill="#cdd3dc">
    <rect x="596" y="540" width="112" height="24" rx="6" fill="#252932" stroke="#343a46"/>
    <text x="652" y="556" text-anchor="middle">AppIcon.icns</text>
    <rect x="716" y="540" width="118" height="24" rx="6" fill="#252932" stroke="#343a46"/>
    <text x="775" y="556" text-anchor="middle">icon_1024.png</text>
    <rect x="842" y="540" width="128" height="24" rx="6" fill="#252932" stroke="#343a46"/>
    <text x="906" y="556" text-anchor="middle">AppIcon.iconset</text>
    <rect x="978" y="540" width="104" height="24" rx="6" fill="#252932" stroke="#343a46"/>
    <text x="1030" y="556" text-anchor="middle">AppIcon.ico</text>
  </g>

  <!-- copy as agent prompt -->
  <rect x="700" y="572" width="180" height="24" rx="6" fill="#252932" stroke="#343a46"/>
  <text x="790" y="588" fill="#cdd3dc" font-size="11" text-anchor="middle">Copy as agent prompt</text>

  <!-- edit bar -->
  <rect x="596" y="598" width="330" height="26" rx="6" fill="#22262e" stroke="#333844"/>
  <text x="610" y="615" fill="#6e7580" font-size="11.5">change something: "make the bell larger"</text>
  <rect x="936" y="598" width="86" height="26" rx="6" fill="#252932" stroke="#343a46"/>
  <text x="979" y="615" fill="#dfe3ea" font-size="11.5" text-anchor="middle">Edit icon</text>

  <!-- history strip -->
  <line x1="452" y1="628" x2="1180" y2="628" stroke="#2b2f38"/>
  <rect x="452" y="628" width="728" height="112" fill="#171a20"/>
  <text x="484" y="654" fill="#8b929c" font-size="11.5">Previous rolls</text>

  <use href="#waterIcon" x="484" y="668" width="48" height="48"/>
  <text x="508" y="730" fill="#9aa1ad" font-size="10" text-anchor="middle">Tidepool</text>

  <g opacity="0.92">
    <rect x="556" y="668" width="48" height="48" rx="11" fill="#6d5cd6"/>
    <path d="M572 704 v-20 h8 v20 z M584 704 v-28 h8 v28 z" fill="#efeaff"/>
    <text x="580" y="730" fill="#9aa1ad" font-size="10" text-anchor="middle">Cadence</text>
  </g>
  <g opacity="0.92">
    <rect x="628" y="668" width="48" height="48" rx="11" fill="#2f9e6b"/>
    <circle cx="652" cy="690" r="12" fill="#e7fff3"/>
    <rect x="648" y="682" width="8" height="10" rx="2" fill="#2f9e6b"/>
    <text x="652" y="730" fill="#9aa1ad" font-size="10" text-anchor="middle">Fernpost</text>
  </g>
  <g opacity="0.92">
    <rect x="700" y="668" width="48" height="48" rx="11" fill="#c9534a"/>
    <path d="M712 700 l12 -18 l12 18 z" fill="#ffeae8"/>
    <text x="724" y="730" fill="#9aa1ad" font-size="10" text-anchor="middle">Peakline</text>
  </g>
</svg>
